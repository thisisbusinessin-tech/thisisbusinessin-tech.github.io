<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terry's | Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header>
            <h1 class="brand-name">TERRY'S</h1>
        </header>
        
        <section class="content">
            <p class="subtitle">Redefining Streetwear</p>
            <h2 class="main-title">The debut collection is dropping soon.</h2>
            <p class="description">We are currently crafting our first pieces. Join the exclusive list to get early access before the official launch.</p>

            <form id="notify-form" class="notify-form">
                <input type="email" id="email-input" placeholder="Enter your email address" required>
                <button type="submit" class="submit-btn">Notify Me</button>
            </form>
            
            <div id="success-message" class="hidden">Welcome to the family. We'll be in touch.</div>
        </section>

        <footer>
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">X / Twitter</a>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
